<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background filled completely to the edge for maskable icons -->
  <rect width="512" height="512" fill="#0F172A" />
  
  <!-- Content scaled slightly smaller to fit perfectly inside the safe area (80%) -->
  <g transform="translate(51, 51) scale(0.8)">
    <!-- Outer Glow Ring -->
    <circle cx="256" cy="256" r="210" fill="none" stroke="#3B82F6" stroke-width="6" opacity="0.8" />
    
    <!-- Indian Tricolor Accent Arc Swooshes -->
    <path d="M 120 340 A 150 150 0 0 1 120 172" fill="none" stroke="#FF671F" stroke-width="12" stroke-linecap="round" opacity="0.9" />
    <path d="M 392 172 A 150 150 0 0 1 392 340" fill="none" stroke="#046A38" stroke-width="12" stroke-linecap="round" opacity="0.9" />

    <!-- Rocket Fire/Flame -->
    <path d="M 236 340 Q 256 420 276 340 Z" fill="url(#flameGradient)" />

    <!-- Main Rocket Hull -->
    <path d="M 256 120 C 276 190 290 260 290 320 L 222 320 C 222 260 236 190 256 120 Z" fill="#F8FAFC" />
    
    <!-- Rocket Wings -->
    <path d="M 222 280 L 176 320 L 222 320 Z" fill="#1D4ED8" />
    <path d="M 290 280 L 336 320 L 290 320 Z" fill="#1D4ED8" />
    
    <!-- Rocket Fin/Nose Accent -->
    <path d="M 256 120 C 263 145 268 170 270 190 L 242 190 C 244 170 249 145 256 120 Z" fill="#EF4444" />

    <!-- Window in Rocket -->
    <circle cx="256" cy="230" r="20" fill="#0EA5E9" stroke="#CBD5E1" stroke-width="4" />
  </g>

  <!-- Gradients -->
  <defs>
    <linearGradient id="flameGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F97316" />
      <stop offset="100%" stop-color="#EAB308" stop-opacity="0.2" />
    </linearGradient>
  </defs>
</svg>
